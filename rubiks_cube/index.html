<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rubik's Cube 3D</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #1a1a1a;
        color: #f0f0f0;
        font-family: sans-serif;
        overflow: hidden;
      }

      #ui {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: flex-end;
        z-index: 10;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        background: #4a90e2;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: background 0.2s;
      }

      button:hover:not(:disabled) {
        background: #357abd;
      }

      button:disabled {
        background: #555;
        cursor: not-allowed;
      }

      #info {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.7);
        padding: 12px 16px;
        border-radius: 6px;
        font-size: 14px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
  </head>

  <body>
    <div id="ui">
      <button id="solveBtn">Solve Cube</button>
      <button id="scrambleBtn">Scramble</button>
      <button id="resetBtn">Reset</button>
    </div>
    <div id="info">Drag to rotate view</div>
    <script src="sketch.js"></script>
  </body>
</html>
